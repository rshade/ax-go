name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.5'
  # Bypass the Go proxy for rshade modules - fetch directly from GitHub.
  GOPRIVATE: github.com/rshade/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detector and coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Enforce coverage floors
        run: go run ./internal/cmd/covercheck -coverage coverage.out

      # always() so the coverage profile is uploaded even when the "Enforce
      # coverage floors" gate above fails — that is exactly when a developer
      # needs coverage.out to see which lines are uncovered.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out

      # Codecov upload is advisory: the authoritative gate is the
      # "Enforce coverage floors" step above. Keep fail_ci_if_error: false so a
      # Codecov outage never blocks a PR. Public repos need no token; if this
      # repo goes private, add CODECOV_TOKEN to GitHub Secrets and pass
      # `token: ${{ secrets.CODECOV_TOKEN }}` here.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
          verbose: true

  # The default configuration is covered by the "test" job above (with coverage).
  # This job covers the three declined configurations. Code behind
  # //go:build ax_no_grpc or //go:build ax_no_otlp is invisible to an untagged
  # `go test ./...`, so without this job the feature would ship untested by
  # construction.
  test-tags:
    name: Test (${{ matrix.tags }})
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false so one broken configuration doesn't mask the others -
      # knowing which specific tag combination broke is the point.
      fail-fast: false
      matrix:
        tags:
          - ax_no_grpc
          - ax_no_otlp
          - ax_no_grpc,ax_no_otlp
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detector
        run: go test -race -tags='${{ matrix.tags }}' ./...

      - name: Run go vet
        run: go vet -tags='${{ matrix.tags }}' ./...

  bench:
    name: Performance Regression Budget
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Enforce performance regression budget
        env:
          BENCH_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: make bench-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run markdownlint
        shell: bash
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli@0.49.0 \
            AGENTS.md README.md CONTRIBUTING.md .github/copilot-instructions.md 'docs/**/*.md'

      - name: Run actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          find .github/workflows -name '*.yml' -not -name '*.lock.yml' -print0 | xargs -0 actionlint

  # golangci-lint accepts exactly one build-tag set per run, so the declined
  # configurations need their own invocations. The default configuration is
  # linted by the "lint" job above, which also owns markdownlint and actionlint
  # (those are tag-independent and must not run four times).
  lint-tags:
    name: Lint (${{ matrix.tags }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tags:
          - ax_no_grpc
          - ax_no_otlp
          - ax_no_grpc,ax_no_otlp
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m --build-tags=${{ matrix.tags }}

  # PRs only: lints the commits between base and head. release-please builds
  # CHANGELOG.md from Conventional Commits, so non-conforming messages fail
  # here instead of corrupting the generated release notes.
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history so the PR base commit is available to lint from.
          fetch-depth: 0

      - name: Lint PR commits
        shell: bash
        run: |
          set -euo pipefail
          npx --yes --package=@commitlint/cli@21.2.1 \
            --package=@commitlint/config-conventional@21.2.0 \
            commitlint --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}" --verbose

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Run govulncheck
        run: govulncheck ./...

  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ "$(git diff --name-only)" ]; then
            echo "go mod tidy resulted in changes"
            git diff
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Check example coverage on the primary API
        run: go run ./internal/cmd/doccover

      # surfacecheck owns its whole matrix inside one process: it sets GOOS and
      # GOARCH per load itself. That is exactly why it belongs here rather than
      # in crosscompile.yml, whose job-level GOOS/GOARCH env would fight the
      # tool's own per-combination environment.
      - name: Check the public surface against its reviewed baseline and audit
        run: go run ./internal/cmd/surfacecheck
