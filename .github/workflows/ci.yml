name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.4'
  # Bypass the Go proxy for rshade modules - fetch directly from GitHub.
  GOPRIVATE: github.com/rshade/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detector and coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Enforce coverage floors
        run: go run ./internal/cmd/covercheck -coverage coverage.out

      # always() so the coverage profile is uploaded even when the "Enforce
      # coverage floors" gate above fails — that is exactly when a developer
      # needs coverage.out to see which lines are uncovered.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out

      # Codecov upload is advisory: the authoritative gate is the
      # "Enforce coverage floors" step above. Keep fail_ci_if_error: false so a
      # Codecov outage never blocks a PR. Public repos need no token; if this
      # repo goes private, add CODECOV_TOKEN to GitHub Secrets and pass
      # `token: ${{ secrets.CODECOV_TOKEN }}` here.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
          verbose: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run markdownlint
        shell: bash
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli@0.45.0 \
            AGENTS.md README.md CONTRIBUTING.md 'docs/**/*.md'

      - name: Run actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          find .github/workflows -name '*.yml' -not -name '*.lock.yml' -print0 | xargs -0 actionlint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ "$(git diff --name-only)" ]; then
            echo "go mod tidy resulted in changes"
            git diff
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Check example coverage on the primary API
        run: go run ./internal/cmd/doccover
